<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(270deg,#ff5f6d,#ffc371,#ff758c,#ff7eb3);
background-size:600% 600%;
animation:bgMove 15s ease infinite;
color:white;
text-align:center;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* INTRO */

#intro{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
}

#heartBtn{
font-size:26px;
padding:20px 40px;
border:none;
border-radius:60px;
background:white;
color:#ff4d6d;
cursor:pointer;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
transition:0.3s;
}

#heartBtn:hover{
transform:scale(1.1);
}

/* MAIN */

#main{
display:none;
padding:20px;
}

h1{
font-size:40px;
letter-spacing:1px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 35px #ff004c;}
}

.message{
font-size:18px;
margin:15px auto;
max-width:700px;
}

/* GLASS CARD */

.card{
backdrop-filter:blur(12px);
background:rgba(255,255,255,0.15);
border-radius:20px;
padding:20px;
width:95%;
margin:auto;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* PHOTO GRID */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.gallery img{
width:100%;
height:28vh;
object-fit:cover;
border-radius:12px;
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
to{opacity:1}
}

/* MOBILE */

@media (max-width:700px){

.gallery{
grid-template-columns:repeat(2,1fr);
}

.gallery img{
height:22vh;
}

h1{
font-size:30px;
}

}

/* FLOATING HEARTS */

.heart{
position:absolute;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* PETALS */

.petal{
position:absolute;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

</style>

</head>

<body>

<div id="intro">
<h1>💖 A Surprise For You 💖</h1>
<button id="heartBtn">Open My Heart ❤️</button>
</div>

<div id="main">

<div class="card">

<h1>💖 To My Beautiful Wife 💖</h1>

<div class="message" id="typeText"></div>

<div class="gallery">
<img id="img1">
<img id="img2">
<img id="img3">
<img id="img4">
<img id="img5">
<img id="img6">
</div>

</div>

</div>

<audio id="music" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<script>

document.getElementById("heartBtn").onclick=function(){

document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
document.getElementById("music").play();

startAnimations();

}

const text = `
You are not just my wife,
you are my best friend, my happiness, my peace and my forever home.

Every moment with you becomes a beautiful memory
and every day I spend with you feels like a blessing.

Thank you for filling my life with love, laughter and endless happiness.

No matter where life takes us,
my heart will always belong to you.

I Love You Forever ❤️
`;

let i=0;

function typeWriter(){
if(i < text.length){
document.getElementById("typeText").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,35);
}
}

/* PHOTOS */

const photos=["p1.jpg","p2.jpg","p3.jpg","p4.jpg","p5.jpg","p6.jpg"];

function shufflePhotos(){

let shuffled=[...photos].sort(()=>0.5-Math.random());

img1.src=shuffled[0];
img2.src=shuffled[1];
img3.src=shuffled[2];
img4.src=shuffled[3];
img5.src=shuffled[4];
img6.src=shuffled[5];

}

function startAnimations(){

typeWriter();

shufflePhotos();
setInterval(shufflePhotos,4000);

setInterval(createHeart,400);
setInterval(createPetal,600);

}

/* HEARTS */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

/* PETALS */

function createPetal(){

const petal=document.createElement("div");

petal.classList.add("petal");
petal.innerHTML="🌹";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),9000);

}

</script>

</body>
</html>
