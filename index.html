<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Love</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#1c1c28,#050507);
color:white;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

/* INTRO */

#intro{
text-align:center;
position:absolute;
animation:fadeIn 2s;
}

#intro h1{
font-family:'Playfair Display',serif;
font-size:42px;
margin-bottom:35px;
letter-spacing:1px;
}

#heartBtn{

padding:18px 45px;
font-size:20px;
border:none;
border-radius:60px;
cursor:pointer;

background:linear-gradient(135deg,#ff4e8a,#ff9966);

color:white;

box-shadow:0 15px 40px rgba(255,80,120,0.4);

transition:all .4s ease;

}

#heartBtn:hover{

transform:scale(1.1);
box-shadow:0 20px 60px rgba(255,100,140,0.6);

}

/* MAIN */

#main{
display:none;
width:92%;
max-width:1100px;
animation:fadeIn 1.5s;
}

/* GLASS CARD */

.layout{

display:grid;

grid-template-columns:2fr 1fr;
grid-template-rows:1fr 1fr;

gap:15px;

height:70vh;

padding:15px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(15px);

border-radius:25px;

box-shadow:0 30px 80px rgba(0,0,0,0.6);

}

/* BIG PHOTO */

.hero{

grid-row:1/3;

border-radius:20px;

overflow:hidden;

position:relative;

}

.hero img{

width:100%;
height:100%;

object-fit:cover;

transition:opacity 1.5s ease;

}

/* STACK PHOTOS */

.stack{

border-radius:20px;

overflow:hidden;

}

.stack img{

width:100%;
height:100%;
object-fit:cover;

transition:opacity 1.5s ease;

}

/* MESSAGE */

.message{

margin-top:35px;

text-align:center;

font-size:34px;

line-height:1.8;

max-width:750px;

margin-left:auto;
margin-right:auto;

font-family:'Great Vibes',cursive;

letter-spacing:1px;

color:#fff;

text-shadow:
0 0 10px rgba(255,255,255,0.4),
0 0 25px rgba(255,100,150,0.3);

animation:fadeMessage 2s ease;

}

/* FLOATING PARTICLES */

.particle{

position:absolute;

width:6px;
height:6px;

background:white;

border-radius:50%;

opacity:.4;

animation:float 10s linear infinite;

}

@keyframes float{

0%{
transform:translateY(0);
opacity:.5;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* ANIMATIONS */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadeMessage{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:700px){

.layout{

grid-template-columns:1fr;

grid-template-rows:40vh 25vh 25vh;

}

.hero{
grid-row:auto;
}

.message{
font-size:28px;
}

}

</style>

</head>

<body>

<div id="intro">

<h1>A Little Surprise For You ❤️</h1>

<button id="heartBtn">Open My Heart</button>

</div>

<div id="main">

<div class="layout">

<div class="hero">
<img id="heroImg">
</div>

<div class="stack">
<img id="img2">
</div>

<div class="stack">
<img id="img3">
</div>

</div>

<div class="message" id="typeText"></div>

</div>

<audio id="music" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<script>

const photos=[
"p1.jpg",
"p2.jpg",
"p3.jpg",
"p4.jpg",
"p5.jpg",
"p6.jpg"
];

heartBtn.onclick=function(){

intro.style.display="none";

main.style.display="block";

music.play();

start();

}

const text=`You are my best friend,
my happiness,
my peace,
and my forever.

Every moment with you
is a memory I never want to lose.

I Love You ❤️`;

let i=0;

function typeWriter(){

if(i<text.length){

typeText.innerHTML+=text.charAt(i);

i++;

setTimeout(typeWriter,40);

}

}

function rotatePhotos(){

let shuffled=[...photos].sort(()=>0.5-Math.random());

fade(heroImg,shuffled[0]);
fade(img2,shuffled[1]);
fade(img3,shuffled[2]);

}

function fade(el,src){

el.style.opacity=0;

setTimeout(()=>{

el.src=src;

el.style.opacity=1;

},500);

}

function start(){

typeWriter();

rotatePhotos();

setInterval(rotatePhotos,5000);

setInterval(createParticle,400);

}

function createParticle(){

const p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(p);

setTimeout(()=>p.remove(),10000);

}

</script>

</body>
</html>
